<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cool window designs</title>
    <link rel="icon" type="image/png" href="favicon.png">
<style>
:root {
  /* Default Light Mode (macOS style) */
  --bg-body: #ececec;
  --window-bg: #f6f6f6;
  --content-bg: white;
  --titlebar-bg: linear-gradient(#e9e9e9, #dcdcdc);
  --text-color: #333;
  --border-radius: 12px;
  --win-border: none;
}

/* Dark Mode Variables */
body.dark {
  --bg-body: #121212;
  --window-bg: #2a2a2a;
  --content-bg: #1e1e1e;
  --titlebar-bg: linear-gradient(#3a3a3a, #2a2a2a);
  --text-color: #f1f1f1;
}

/* Windows 10 Theme Overrides */
body.windows-mode {
  --bg-body: #0078d7;
  --window-bg: #ffffff;
  --content-bg: #ffffff;
  --titlebar-bg: #ffffff;
  --text-color: #000;
  --border-radius: 0px;
  --win-border: 1px solid #1883d7;
}

body.windows-mode.dark {
  --bg-body: #121212;
  --window-bg: #2b2b2b;
  --content-bg: #1e1e1e;
  --titlebar-bg: #2b2b2b;
  --text-color: #ffffff;
  --win-border: 1px solid #444;
}

body {
  background: var(--bg-body);
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  transition: 0.3s ease;
  margin: 0;
  overflow: hidden;
}

/* UI Controls Containers */
.top-left-controls { position: absolute; top: 20px; left: 20px; z-index: 9999; display: flex; align-items: center; gap: 10px; color: var(--text-color); }
.top-right-controls { position: absolute; top: 20px; right: 20px; z-index: 9999; }

/* Switch Styling */
.switch { position: relative; width: 50px; height: 26px; display: inline-block; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; inset: 0; cursor: pointer; background-color: #ccc; border-radius: 34px; transition: 0.3s; }
.slider::before { content: ""; position: absolute; height: 20px; width: 20px; left: 3px; top: 3px; background-color: white; border-radius: 50%; transition: 0.3s; }
input:checked + .slider { background-color: #34c759; }
input:checked + .slider::before { transform: translateX(24px); }

/* OS Toggle Button */
.os-toggle-btn {
  padding: 8px 16px;
  background: var(--window-bg);
  color: var(--text-color);
  border: 1px solid var(--text-color);
  cursor: pointer;
  font-weight: bold;
  font-size: 13px;
  border-radius: 4px;
  transition: 0.2s;
}
.os-toggle-btn:hover { opacity: 0.8; }

/* The Window */
.macos-window {
  position: absolute;
  width: 450px;
  background: var(--window-bg);
  border-radius: var(--border-radius);
  border: var(--win-border);
  box-shadow: 0 15px 35px rgba(0,0,0,0.3);
  overflow: hidden;
  user-select: none;
  z-index: 10;
}

.title-bar {
  height: 38px;
  background: var(--titlebar-bg);
  display: flex;
  align-items: center;
  padding: 0 12px;
  cursor: grab;
}

/* Control Buttons (macOS default) */
.window-buttons { display: flex; gap: 7px; order: 1; }
.window-buttons span { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
.red { background: #ff5f57; } .yellow { background: #ffbd2e; } .green { background: #28c840; }

.title { position: absolute; right: 15px; font-size: 11px; color: var(--text-color); opacity: 0.7; order: 2; }

/* Windows Mode UI Flip */
body.windows-mode .window-buttons { order: 2; margin-left: auto; gap: 0; }
body.windows-mode .window-buttons span { 
    width: 45px; height: 38px; border-radius: 0; background: transparent !important;
    display: flex; align-items: center; justify-content: center; color: var(--text-color);
    font-size: 14px;
}
body.windows-mode .window-buttons span::after { font-family: sans-serif; }
body.windows-mode .red::after { content: "✕"; }
body.windows-mode .yellow::after { content: "▢"; }
body.windows-mode .green::after { content: "－"; }
body.windows-mode .window-buttons span:hover { background: rgba(0,0,0,0.1) !important; }
body.windows-mode.dark .window-buttons span:hover { background: rgba(255,255,255,0.1) !important; }
body.windows-mode .red:hover { background: #e81123 !important; color: white !important; }

body.windows-mode .title { position: static; order: 1; opacity: 1; font-size: 12px; }

.window-content { padding: 25px; background: var(--content-bg); min-height: 120px; }

/* Typing Effect */
.typing {
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  display: inline-block;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 20px;
  font-weight: bold;
}
.typing::after {
  content: "|";
  margin-left: 4px;
  animation: blink 1s infinite;
  -webkit-text-fill-color: var(--text-color);
}
body.windows-mode .typing::after { content: "_"; }

@keyframes blink { 0%,50%,100% {opacity:1;} 25%,75% {opacity:0;} }
</style>

<a href="about.html" style="position: absolute; bottom: 20px; left: 20px; color: var(--text-color); text-decoration: none; font-size: 14px; z-index: 9999;">About</a>

<div class="macos-window" style="top: 350px; left: 350px;">

                                    {&quot;text&quot;:&quot;This was made using Javascript, CSS and HTML&quot;,&quot;c1&quot;:&quot;#00b09b&quot;, &quot;c2&quot;:&quot;#a020f0&quot;},

<div class="macos-window" style="top: 150px; left: 600px;">
  <div class="title-bar">
    <div class="window-buttons"><span class="green"></span><span class="yellow"></span><span class="red"></span></div>
    <div class="title">Powershell >_</div>
  </div>
  <div class="window-content">
    <h1 class="typing" data-words="[{&quot;text&quot;:&quot;No Copyright on this website! I believe in open-source&quot;,&quot;c1&quot;:&quot;#f83600&quot;, &quot;c2&quot;:&quot;#f9d423&quot;},
                                    {&quot;text&quot;:&quot;Thanks to Netlify!&quot;,&quot;c1&quot;:&quot;#f83600&quot;, &quot;c2&quot;:&quot;#f9d423&quot;},
                                    {&quot;text&quot;:&quot;Powershell&quot;,&quot;c1&quot;:&quot;#f83600&quot;, &quot;c2&quot;:&quot;#f9d423&quot;}]">
    </h1>
  </div>
</div>

<script>
// --- THEME & OS TOGGLES ---
function toggleTheme(el){ 
    const isDark = el.checked;
    document.body.classList.toggle("dark", isDark); 
    
    // Switch the text based on the mode
    const label = document.getElementById("themeLabel");
    label.innerText = isDark ? "Light Mode" : "Dark Mode";
}

function toggleOS() {
    const body = document.body;
    const btn = document.getElementById("osBtn");
    body.classList.toggle("windows-mode");
    
    if(body.classList.contains("windows-mode")) {
        btn.innerText = "macOS Mode";
    } else {
        btn.innerText = "Windows Mode";
    }
}

// --- UNIVERSAL DRAGGER ---
let activeWin = null;
let winOffset = { x: 0, y: 0 };
let highestZ = 100;

document.addEventListener("mousedown", (e) => {
  const bar = e.target.closest('.title-bar');
  if (bar) {
    activeWin = bar.parentElement;
    highestZ++;
    activeWin.style.zIndex = highestZ;
    winOffset.x = e.clientX - activeWin.offsetLeft;
    winOffset.y = e.clientY - activeWin.offsetTop;
  }
});

document.addEventListener("mousemove", (e) => {
  if (!activeWin) return;
  activeWin.style.left = (e.clientX - winOffset.x) + "px";
  activeWin.style.top = (e.clientY - winOffset.y) + "px";
});

document.addEventListener("mouseup", () => { activeWin = null; });

// --- UNIVERSAL TYPER ---
document.addEventListener("DOMContentLoaded", () => {
  class TypeWriter {
    constructor(el) {
      this.el = el;
      this.words = JSON.parse(el.getAttribute("data-words"));
      this.index = 0;
      this.charIndex = 0;
      this.isDeleting = false;
      this.type();
    }
    type() {
      const wordObj = this.words[this.index];
      const fullText = wordObj.text;
      this.el.style.background = `linear-gradient(45deg, ${wordObj.c1}, ${wordObj.c2})`;
      this.el.style.webkitBackgroundClip = "text";
      this.charIndex += this.isDeleting ? -1 : 1;
      this.el.textContent = fullText.substring(0, this.charIndex);
      let speed = this.isDeleting ? 40 : 70;
      if (!this.isDeleting && this.charIndex === fullText.length) {
        speed = 1500; this.isDeleting = true;
      } else if (this.isDeleting && this.charIndex === 0) {
        this.isDeleting = false;
        this.index = (this.index + 1) % this.words.length;
        speed = 500;
      }
      setTimeout(() => this.type(), speed);
    }
  }
  document.querySelectorAll(".typing").forEach(el => new TypeWriter(el));
});
</script>
