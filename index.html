<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cool window designs</title>
    <link rel="icon" type="image/png" href="favicon.png">
<style>
:root {
  --bg-body: #ececec;
  --window-bg: #f6f6f6;
  --content-bg: white;
  --titlebar-bg: linear-gradient(#e9e9e9, #dcdcdc);
  --text-color: #333;
  --border-radius: 12px;
  --win-border: none;
}

body.dark {
  --bg-body: #121212;
  --window-bg: #2a2a2a;
  --content-bg: #1e1e1e;
  --titlebar-bg: linear-gradient(#3a3a3a, #2a2a2a);
  --text-color: #f1f1f1;
}

body.windows-mode {
  --bg-body: #ececec;
  --window-bg: #ffffff;
  --content-bg: #ffffff;
  --titlebar-bg: #ffffff;
  --text-color: #000;
  --border-radius: 0px;
  --win-border: 1px solid #1883d7;
}

body.windows-mode.dark {
  --bg-body: #121212;
  --window-bg: #2b2b2b;
  --content-bg: #1e1e1e;
  --titlebar-bg: #2b2b2b;
  --text-color: #ffffff;
  --win-border: 1px solid #444;
}

body {
  background: var(--bg-body);
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  transition: 0.3s ease;
  margin: 0;
  overflow: hidden;
}

/* --- MOBILE SPECIFIC LOGIC --- */
/* Only trigger for mobile devices (screens under 900px) */
@media screen and (max-width: 900px) {
    body { touch-action: none; } /* Disable scroll/zoom only on mobile */
    
    .macos-window {
        max-width: 85vw; /* Make windows smaller for tiny screens */
    }
}

/* --- UI CONTROLS --- */
.top-left-controls { position: absolute; top: 20px; left: 20px; z-index: 9999; display: flex; align-items: center; gap: 10px; color: var(--text-color); }
.top-right-controls { position: absolute; top: 20px; right: 20px; z-index: 9999; }

.switch { position: relative; width: 50px; height: 26px; display: inline-block; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; inset: 0; cursor: pointer; background-color: #ccc; border-radius: 34px; transition: 0.3s; }
.slider::before { content: ""; position: absolute; height: 20px; width: 20px; left: 3px; top: 3px; background-color: white; border-radius: 50%; transition: 0.3s; }
input:checked + .slider { background-color: #34c759; }
input:checked + .slider::before { transform: translateX(24px); }

.os-toggle-btn {
  padding: 8px 16px;
  background: var(--window-bg);
  color: var(--text-color);
  border: 1px solid var(--text-color);
  cursor: pointer;
  font-weight: bold;
  font-size: 13px;
  border-radius: 4px;
}

/* --- WINDOWS --- */
.macos-window {
  position: absolute;
  width: 450px;
  background: var(--window-bg);
  border-radius: var(--border-radius);
  border: var(--win-border);
  box-shadow: 0 15px 35px rgba(0,0,0,0.3);
  overflow: hidden;
  user-select: none;
  z-index: 10;
}

.title-bar {
  height: 38px;
  background: var(--titlebar-bg);
  display: flex;
  align-items: center;
  padding: 0 12px;
  cursor: grab;
}

.window-buttons { display: flex; gap: 7px; order: 1; }
.window-buttons span { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
.red { background: #ff5f57; } .yellow { background: #ffbd2e; } .green { background: #28c840; }
.title { position: absolute; right: 15px; font-size: 11px; color: var(--text-color); opacity: 0.7; order: 2; pointer-events: none; }

body.windows-mode .window-buttons { order: 2; margin-left: auto; gap: 0; }
body.windows-mode .window-buttons span { 
    width: 45px; height: 38px; border-radius: 0; background: transparent !important;
    display: flex; align-items: center; justify-content: center; color: var(--text-color);
    font-size: 14px;
}
body.windows-mode .red::after { content: "✕"; }
body.windows-mode .yellow::after { content: "▢"; }
body.windows-mode .green::after { content: "－"; }
body.windows-mode .title { position: static; order: 1; opacity: 1; font-size: 12px; }

.window-content { padding: 25px; background: var(--content-bg); min-height: 120px; }

.typing {
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  display: inline-block;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 20px;
  font-weight: bold;
}
.typing::after {
  content: "|";
  margin-left: 4px;
  animation: blink 1s infinite;
  -webkit-text-fill-color: var(--text-color);
}
@keyframes blink { 0%,50%,100% {opacity:1;} 25%,75% {opacity:0;} }
</style>
</head>
<body>

<a href="about.html" style="position: absolute; bottom: 20px; left: 20px; color: var(--text-color); text-decoration: underline; font-size: 14px; z-index: 9999;">About</a>
<a href="downloads.html" style="position: absolute; bottom: 50px; left: 20px; color: var(--text-color); text-decoration: underline; font-size: 14px; z-index: 9999;">Downloads Page</a>
<div class="top-left-controls">
  <label class="switch">
    <input type="checkbox" onchange="toggleTheme(this)">
    <span class="slider"></span>
  </label>
  <span id="themeLabel">Dark Mode</span>
</div>

<div class="top-right-controls">
  <button class="os-toggle-btn" onclick="toggleOS()" id="osBtn">Windows Mode</button>
</div>

<div class="macos-window" style="top: 100px; left: 100px;">
  <div class="title-bar">
    <div class="window-buttons"><span class="green"></span><span class="yellow"></span><span class="red"></span></div>
    <div class="title">Bash >_</div>
  </div>
  <div class="window-content">
    <h1 class="typing" data-words='[{"text":"Made by Earth-Voxels on Github","c1":"#00c6ff", "c2":"#f9d423"},{"text":"Bash","c1":"#00c6ff", "c2":"#f9d423"},{"text":"No Python used here at all","c1":"#00c6ff", "c2":"#f9d423"}]'></h1>
  </div>
</div>

<div class="macos-window" style="top: 350px; left: 350px;">
  <div class="title-bar">
    <div class="window-buttons"><span class="red"></span><span class="yellow"></span><span class="green"></span></div>
    <div class="title">Zsh >_</div>
  </div>
  <div class="window-content">
    <h1 class="typing" data-words='[{"text":"This design is so cool","c1":"#00b09b", "c2":"#a020f0"},{"text":"This was made using Javascript, CSS and HTML","c1":"#00b09b", "c2":"#a020f0"},{"text":"Zsh","c1":"#00b09b", "c2":"#a020f0"}]'></h1>
  </div>
</div>

<div class="macos-window" style="top: 150px; left: 600px;">
  <div class="title-bar">
    <div class="window-buttons"><span class="green"></span><span class="yellow"></span><span class="red"></span></div>
    <div class="title">Powershell >_</div>
  </div>
  <div class="window-content">
    <h1 class="typing" data-words='[{"text":"No Copyright on this website! This whole website is open sourced on the official Github repository","c1":"#f83600", "c2":"#f9d423"},{"text":"Thanks to Netlify!","c1":"#f83600", "c2":"#f9d423"},{"text":"Powershell","c1":"#f83600", "c2":"#f9d423"}]'></h1>
  </div>
</div>

<script>
function toggleTheme(el){ 
    const isDark = el.checked;
    document.body.classList.toggle("dark", isDark); 
    document.getElementById("themeLabel").innerText = isDark ? "Light Mode" : "Dark Mode";
}

function toggleOS() {
    const body = document.body;
    const btn = document.getElementById("osBtn");
    body.classList.toggle("windows-mode");
    btn.innerText = body.classList.contains("windows-mode") ? "macOS Mode" : "Windows Mode";
}

// --- HYBRID DRAGGER (MOUSE + TOUCH) ---
let activeWin = null;
let winOffset = { x: 0, y: 0 };
let highestZ = 100;

function startDrag(e) {
    const bar = e.target.closest('.title-bar');
    if (!bar) return;
    activeWin = bar.parentElement;
    highestZ++;
    activeWin.style.zIndex = highestZ;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    winOffset.x = clientX - activeWin.offsetLeft;
    winOffset.y = clientY - activeWin.offsetTop;
}

function moveDrag(e) {
    if (!activeWin) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    activeWin.style.left = (clientX - winOffset.x) + "px";
    activeWin.style.top = (clientY - winOffset.y) + "px";
}

function endDrag() { activeWin = null; }

document.addEventListener("mousedown", startDrag);
document.addEventListener("mousemove", moveDrag);
document.addEventListener("mouseup", endDrag);

document.addEventListener("touchstart", startDrag, {passive: false});
document.addEventListener("touchmove", moveDrag, {passive: false});
document.addEventListener("touchend", endDrag);

// --- UNIVERSAL TYPER ---
document.addEventListener("DOMContentLoaded", () => {
  class TypeWriter {
    constructor(el) {
      this.el = el;
      this.words = JSON.parse(el.getAttribute("data-words"));
      this.index = 0;
      this.charIndex = 0;
      this.isDeleting = false;
      this.type();
    }
    type() {
      const wordObj = this.words[this.index];
      const fullText = wordObj.text;
      this.el.style.background = `linear-gradient(45deg, ${wordObj.c1}, ${wordObj.c2})`;
      this.el.style.webkitBackgroundClip = "text";
      this.charIndex += this.isDeleting ? -1 : 1;
      this.el.textContent = fullText.substring(0, this.charIndex);
      let speed = this.isDeleting ? 40 : 70;
      if (!this.isDeleting && this.charIndex === fullText.length) {
        speed = 1500; this.isDeleting = true;
      } else if (this.isDeleting && this.charIndex === 0) {
        this.isDeleting = false;
        this.index = (this.index + 1) % this.words.length;
        speed = 500;
      }
      setTimeout(() => this.type(), speed);
    }
  }
  document.querySelectorAll(".typing").forEach(el => new TypeWriter(el));
});
</script>

</body>
</html>
